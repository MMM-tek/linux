<!doctype html>
<html>
  <head>
    <!-- Asegúrate de que las rutas coincidan con tu carpeta node_modules -->
    <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
    <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
    <style>
  #terminal {
    height: 90vh; /* Que ocupe casi toda la pantalla */
    background: black;
  }
</style>
  </head>
  <body>
    <div id="terminal"></div>

    <script>
      // IMPORTANTE: En versiones nuevas se accede así
      const term = new window.Terminal({
        cursorBlink: true,
        theme: {
          background: '#1b1b1b'
        }
      });
      
      term.open(document.getElementById('terminal'));
      term.write('Terminal local cargada correctamente \r\n$ ');
    </script>
  </body>
</html>
